{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-8">
  <div class="card p-6 border border-gray-200 dark:border-gray-700 rounded-xl">
    <h2 class="text-2xl font-bold mb-4 text-gray-800 dark:text-gray-100"><i class="fa-solid fa-lock text-blue-600 mr-2"></i>Sign in</h2>
    <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">This instance requires a password to access.</p>
    <form method="POST" class="space-y-3">
      <input type="password" name="password" class="w-full p-2 border rounded-lg bg-[var(--input-bg)] text-[var(--input-text)] border-[var(--input-border)] focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:outline-none" placeholder="Enter password" required>
      <button type="submit" class="w-full btn btn-primary"><i class="fa-solid fa-arrow-right-to-bracket mr-1"></i>Continue</button>
    </form>
  </div>
</div>
{% endblock %}
